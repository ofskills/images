---
- hosts: all
  become: yes
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
        force_apt_get: yes

    - name: Install required packages
      ansible.builtin.package:
        name:
          - screen
          - vim
        state: present

    - name: Create required directories
      ansible.builtin.file:
        path: /run/screen
        state: directory
        mode: '0777'

    - name: Ensure the 'user' account can run sudo commands without a password
      ansible.builtin.copy:
        dest: /etc/sudoers.d/user
        content: |
          user ALL=(ALL) NOPASSWD: ALL
        mode: '0440'
        owner: root
        group: root
