---
- hosts: all
  become: yes
  tasks:
    - name: Install k0s binary
      shell: curl -sSLf https://get.k0s.sh | sh
      args:
        creates: /usr/local/bin/k0s

    - name: Ensure /etc/k0s directory exists
      ansible.builtin.file:
        path: /etc/k0s
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Generate default k0s config
      shell: k0s config create > /etc/k0s/k0s.yaml
      args:
        creates: /etc/k0s/k0s.yaml

    - name: Install k0scontroller systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/k0scontroller.service
        content: |
          [Unit]
          Description=k0s - Zero Friction Kubernetes
          ConditionFileIsExecutable=/usr/local/bin/k0s
          After=network-online.target
          Wants=network-online.target

          [Service]
          ExecStart=/usr/local/bin/k0s controller --config=/etc/k0s/k0s.yaml --enable-worker --no-taints --ignore-pre-flight-checks
          RestartSec=10
          Delegate=yes
          KillMode=process
          LimitCORE=infinity
          TasksMax=infinity
          TimeoutStartSec=0
          LimitNOFILE=999999
          Restart=always

          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: '0644'

    - name: Enable k0scontroller service for next boot (systemd-style symlink)
      file:
        src: /etc/systemd/system/k0scontroller.service
        dest: /etc/systemd/system/multi-user.target.wants/k0scontroller.service
        state: link
      when: ansible_facts['os_family'] == 'Debian'

    - name: Create kubectl symlink to k0s
      file:
        src: /usr/local/bin/k0s
        dest: /usr/local/bin/kubectl
        state: link

    - name: Install k0s user kubeconfig service
      ansible.builtin.copy:
        dest: /etc/systemd/system/k0s-user-kubeconfig.service
        content: |
          [Unit]
          Description=Copy k0s kubeconfig to user home
          After=k0scontroller.service
          Wants=k0scontroller.service
          ConditionPathExists=!/home/user/.kube/config

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStartPre=/bin/sh -c 'until [ -f /var/lib/k0s/pki/admin.conf ]; do sleep 1; done'
          ExecStart=/usr/bin/install -d -m 700 -o user -g user /home/user/.kube
          ExecStart=/usr/bin/install -m 600 -o user -g user /var/lib/k0s/pki/admin.conf /home/user/.kube/config

          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: '0644'

    - name: Enable k0s user kubeconfig service for next boot
      file:
        src: /etc/systemd/system/k0s-user-kubeconfig.service
        dest: /etc/systemd/system/multi-user.target.wants/k0s-user-kubeconfig.service
        state: link

- import_playbook: /opt/kubernetes/ansible.yaml
