---
- hosts: all
  become: yes
  tasks:
    - name: Install k3s server (server-only)
      shell: curl -sfL https://get.k3s.io | INSTALL_K3S_SERVER=1 INSTALL_K3S_SKIP_ENABLE=true INSTALL_K3S_SKIP_START=true sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Ensure /etc/rancher/k3s directory exists
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Configure K3s (native snapshotter + readable kubeconfig)
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/config.yaml
        content: |
          snapshotter: native
          write-kubeconfig-mode: "0644"
        owner: root
        group: root
        mode: '0644'

    - name: Enable k3s service for next boot (systemd-style symlink)
      file:
        src: /etc/systemd/system/k3s.service
        dest: /etc/systemd/system/multi-user.target.wants/k3s.service
        state: link
      when: ansible_facts['os_family'] == 'Debian'

    - name: Create kubectl symlink to k3s
      file:
        src: /usr/local/bin/k3s
        dest: /usr/local/bin/kubectl
        state: link

    - name: Install k3s user kubeconfig service
      ansible.builtin.copy:
        dest: /etc/systemd/system/k3s-user-kubeconfig.service
        content: |
          [Unit]
          Description=Copy k3s kubeconfig to user home
          After=k3s.service
          Wants=k3s.service
          ConditionPathExists=!/home/user/.kube/config

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStartPre=/bin/sh -c 'until [ -f /etc/rancher/k3s/k3s.yaml ]; do sleep 1; done'
          ExecStart=/usr/bin/install -d -m 700 -o user -g user /home/user/.kube
          ExecStart=/usr/bin/install -m 600 -o user -g user /etc/rancher/k3s/k3s.yaml /home/user/.kube/config

          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: '0644'

    - name: Enable k3s user kubeconfig service for next boot
      file:
        src: /etc/systemd/system/k3s-user-kubeconfig.service
        dest: /etc/systemd/system/multi-user.target.wants/k3s-user-kubeconfig.service
        state: link

- import_playbook: /opt/kubernetes/ansible.yaml
