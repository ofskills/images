---
- hosts: all
  become: yes
  tasks:
    - name: Install k3s server (server-only)
      shell: curl -sfL https://get.k3s.io | INSTALL_K3S_SERVER=1 INSTALL_K3S_SKIP_ENABLE=true INSTALL_K3S_SKIP_START=true sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Ensure /etc/rancher/k3s directory exists
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Configure K3s (native snapshotter + readable kubeconfig)
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/config.yaml
        content: |
          snapshotter: native
          write-kubeconfig-mode: "0644"
        owner: root
        group: root
        mode: '0644'

    - name: Enable k3s service for next boot (systemd-style symlink)
      file:
        src: /etc/systemd/system/k3s.service
        dest: /etc/systemd/system/multi-user.target.wants/k3s.service
        state: link
      when: ansible_facts['os_family'] == 'Debian'

    - name: Create kubectl symlink to k3s
      file:
        src: /usr/local/bin/k3s
        dest: /usr/local/bin/kubectl
        state: link

- import_playbook: /opt/kubernetes/ansible.yaml
